        air_travel_itinerary:
          $ref: '#/components/schemas/air_travel_itinerary'
        created_time:
          $ref: '#/components/schemas/created_time'
        created_date:
          $ref: '#/components/schemas/created_date'
        last_modified_time:
          $ref: '#/components/schemas/last_modified_time'
        documents:
          $ref: '#/components/schemas/documents'
        created_by_id:
          $ref: '#/components/schemas/created_by_id'
        created_by_name:
          $ref: '#/components/schemas/created_by_name'
        user_id:
          $ref: '#/components/schemas/user_id'
        user_name:
          $ref: '#/components/schemas/user_name'
        user_email:
          $ref: '#/components/schemas/user_email'
        created_by_email:
          $ref: '#/components/schemas/created_by_email'
    custom_fields:
      description: Custom field added.
      type: array
      items:
        type: object
        properties:
          customfield_id:
            $ref: '#/components/schemas/customfield_id'
          data_type:
            $ref: '#/components/schemas/data_type'
          is_active:
            $ref: '#/components/schemas/is_active'
          is_mandatory:
            $ref: '#/components/schemas/is_mandatory'
          label:
            $ref: '#/components/schemas/label'
          value:
            $ref: '#/components/schemas/value'
    policy_id:
      description: Unique ID of the policy applied to the trip request.
      type: integer
      format: int64
