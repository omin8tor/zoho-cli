    attendee_id:
      description: Unique ID of the attendee as a identifier.
      type: integer
      format: int64
      example: '31672000000003102'
    name:
      description: Name of the User.
      type: string
      example: Jayson
    email:
      description: Email ID of the User.
      type: string
      example: jayson@gmail.com
    attendees:
      description: Other travellers of the trip.
      type: array
      items:
        type: object
        properties:
          department_id:
            $ref: '#/components/schemas/department_id'
          user_id:
            $ref: '#/components/schemas/user_id'
          attendee_id:
            $ref: '#/components/schemas/attendee_id'
          name:
            $ref: '#/components/schemas/name'
          employee_number:
            $ref: '#/components/schemas/employee_number'
          email:
            $ref: '#/components/schemas/email'
    file_name:
      description: Name of the Document.
      type: string
      example: receipt1.jpg
    file_size_formatted:
      description: Formatted value of File Size.
      type: string
      example: 35.6 KB
    attachment_order:
      description: Order of the Attached Document.
      type: integer
      example: 1
    document_id:
      description: Unique Id for the Document.
      type: integer
      format: int64
      example: '16367000000078085'
    documents:
      description: Details of Documents attached.
      type: array
      items:
        type: object
        properties:
          file_name:
            $ref: '#/components/schemas/file_name'
          file_size_formatted:
            $ref: '#/components/schemas/file_size_formatted'
          attachment_order:
            $ref: '#/components/schemas/attachment_order'
          document_id:
            $ref: '#/components/schemas/document_id'
    customfield_id:
      description: Unique ID for the Custom Field.
      type: integer
      format: int64
      example: '16367000000093005'
    data_type:
      description: Data Type of the Custom Field.
      type: string
      example: string
    is_active:
      description: Whether the Custom Field is Active. It can either be <code>true</code> or <code>false</code>.
      type: boolean
      example: true
    is_mandatory:
      description: Whether the Custom Field is Mandatory. It can either be <code>true</code> or <code>false</code>.
      type: boolean
      example: false
    label:
      description: Label for the Custom Field.
      type: string
      example: Nick Name
    value:
      description: Value entered in the Custom Field.
      type: string
      example: Tric
    trip:
      type: object
      properties:
        trip_id:
          $ref: '#/components/schemas/trip_id'
        is_international:
