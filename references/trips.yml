      type: array
      items:
        type: object
        properties:
          is_accomodation:
            $ref: '#/components/schemas/is_accomodation'
          is_personal_travel:
            $ref: '#/components/schemas/is_personal_travel'
          line_item_id:
            $ref: '#/components/schemas/line_item_id'
          departure_state:
            $ref: '#/components/schemas/departure_state'
          departure_date:
            $ref: '#/components/schemas/departure_date'
          description:
            $ref: '#/components/schemas/description'
          departure_city:
            $ref: '#/components/schemas/departure_city'
          departure_country:
            $ref: '#/components/schemas/departure_country'
          arrival_country:
            $ref: '#/components/schemas/arrival_country'
          travel_mode:
            $ref: '#/components/schemas/travel_mode'
          arrival_state:
            $ref: '#/components/schemas/arrival_state'
          arrival_city:
            $ref: '#/components/schemas/arrival_city'
          arrival_date:
            $ref: '#/components/schemas/arrival_date'
          order:
            $ref: '#/components/schemas/order'
    hotel_reservation_itinerary:
      description: Hotel Accommodation Itinerary
      type: array
      items:
        type: object
        properties:
          is_accomodation:
            $ref: '#/components/schemas/is_accomodation'
          is_personal_travel:
            $ref: '#/components/schemas/is_personal_travel'
          line_item_id:
            $ref: '#/components/schemas/line_item_id'
          departure_state:
            $ref: '#/components/schemas/departure_state'
          departure_date:
            $ref: '#/components/schemas/departure_date'
          description:
            $ref: '#/components/schemas/description'
          departure_city:
            $ref: '#/components/schemas/departure_city'
          departure_country:
            $ref: '#/components/schemas/departure_country'
          arrival_country:
            $ref: '#/components/schemas/arrival_country'
          travel_mode:
            $ref: '#/components/schemas/travel_mode'
          arrival_state:
            $ref: '#/components/schemas/arrival_state'
          arrival_city:
            $ref: '#/components/schemas/arrival_city'
          arrival_date:
            $ref: '#/components/schemas/arrival_date'
          order:
            $ref: '#/components/schemas/order'
    car_rental_itinerary:
      description: Car Rental Itinerary
      type: array
      items:
        type: object
        properties:
          is_accomodation:
            $ref: '#/components/schemas/is_accomodation'
          is_personal_travel:
            $ref: '#/components/schemas/is_personal_travel'
          line_item_id:
            $ref: '#/components/schemas/line_item_id'
          departure_state:
            $ref: '#/components/schemas/departure_state'
          departure_date:
            $ref: '#/components/schemas/departure_date'
          description:
            $ref: '#/components/schemas/description'
          departure_city:
            $ref: '#/components/schemas/departure_city'
          departure_country:
            $ref: '#/components/schemas/departure_country'
          arrival_country:
            $ref: '#/components/schemas/arrival_country'
          travel_mode:
            $ref: '#/components/schemas/travel_mode'
          arrival_state:
            $ref: '#/components/schemas/arrival_state'
          arrival_city:
            $ref: '#/components/schemas/arrival_city'
          arrival_date:
            $ref: '#/components/schemas/arrival_date'
          order:
            $ref: '#/components/schemas/order'
    other_itinerary:
      description: Other Itinerary
      type: array
      items:
        type: object
        properties:
          is_accomodation:
            $ref: '#/components/schemas/is_accomodation'
          is_personal_travel:
            $ref: '#/components/schemas/is_personal_travel'
          line_item_id:
            $ref: '#/components/schemas/line_item_id'
          departure_state:
            $ref: '#/components/schemas/departure_state'
          departure_date:
            $ref: '#/components/schemas/departure_date'
          description:
            $ref: '#/components/schemas/description'
          departure_city:
            $ref: '#/components/schemas/departure_city'
          departure_country:
            $ref: '#/components/schemas/departure_country'
          arrival_country:
            $ref: '#/components/schemas/arrival_country'
          travel_mode:
