openapi: 3.0.0
info:
  title: Trips
  description: A trip entity allows you to maintain information about the trips of your employees.
  contact: {}
  version: 1.0.0
servers:
  - url: https://www.zohoapis.com/expense/v1
    description: API Endpoint
tags:
  - name: trips
    description: Trips Module
paths:
  /trips:
    post:
      tags:
        - trips
      operationId: create_trip
      summary: Create a trip
      description: Create a new trip.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create-a-trip-request'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/create-a-trip-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoExpense.trip.CREATE
    get:
      tags:
        - trips
      operationId: list_trips
      summary: Retrive list of all trips
      description: List all existing trips.
      parameters:
        - name: filter_by
          in: query
          description: For filtering trips based on status.
          required: false
          schema:
            type: object
            properties:
              Type.Trip%2CStatus.Submitted:
                $ref: '#/components/schemas/Type.Trip-Status.Submitted'
              Type.Trip%2CStatus.Approved:
                $ref: '#/components/schemas/Type.Trip-Status.Approved'
              Type.Trip%2CStatus.Rejected:
                $ref: '#/components/schemas/Type.Trip-Status.Rejected'
              Type.Trip%2CStatus.Closed:
                $ref: '#/components/schemas/Type.Trip-Status.Closed'
              Type.Trip%2CStatus.Cancelled:
                $ref: '#/components/schemas/Type.Trip-Status.Cancelled'
          example: ''
        - name: page
          in: query
          description: Page number to be fetched. Default value is 1.
          required: false
          schema:
            type: integer
            default: 1
          example: 1
        - name: per_page
          in: query
          description: Number of records to be fetched per page. Default value is 200.
          required: false
          schema:
            type: integer
            default: 200
          example: 200
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/retrive-list-of-all-trips-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoExpense.trip.READ
    parameters:
      - $ref: '#/components/parameters/organization_id'
  /trips/{trip_id}:
    get:
      tags:
        - trips
      operationId: get_trip
      summary: Retrive details of a trip
      description: Retrive details of an existing trip.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/retrive-details-of-a-trip-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoExpense.trip.READ
    put:
      tags:
        - trips
      operationId: update_trip
      summary: Update a trip
      description: Update an existing Trip.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/update-a-trip-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/update-a-trip-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoExpense.trip.UPDATE
    delete:
      tags:
        - trips
      operationId: delete_trip
      summary: Delete a trip request
      description: Delete a trip request. Approved, Closed and Cancelled trips cannot be deleted.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/delete-a-trip-request-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoExpense.trip.DELETE
    parameters:
      - name: trip_id
        in: path
        required: true
        description: Unique identifier of the trip.
        schema:
          type: string
        example: '34017000000000103'
      - $ref: '#/components/parameters/organization_id'
  /trips/{trip_id}/approve:
    post:
      tags:
        - trips
      operationId: approve_trip
      summary: Approve a trip request
      description: Approve a submitted trip request.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/approve-a-trip-request-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoExpense.approval.CREATE
    parameters:
      - name: trip_id
        in: path
        required: true
        description: Unique identifier of the trip.
        schema:
          type: string
        example: '34017000000000103'
      - $ref: '#/components/parameters/organization_id'
  /trips/{trip_id}/reject:
    post:
      tags:
        - trips
      operationId: reject_trip
      summary: Reject a trip request
      description: Reject a submitted trip request.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/reject-a-trip-request-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/reject-a-trip-request-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoExpense.approval.CREATE
    parameters:
      - name: trip_id
        in: path
        required: true
        description: Unique identifier of the trip.
        schema:
          type: string
        example: '34017000000000103'
      - $ref: '#/components/parameters/organization_id'
  /trips/{trip_id}/cancel:
    post:
      tags:
        - trips
      operationId: cancel_trip
      summary: Cancel a trip
      description: Cancel a trip.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cancel-a-trip-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cancel-a-trip-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoExpense.trip.CREATE
    parameters:
      - name: trip_id
        in: path
        required: true
        description: Unique identifier of the trip.
        schema:
          type: string
        example: '34017000000000103'
      - $ref: '#/components/parameters/organization_id'
  /trips/{trip_id}/close:
    post:
      tags:
        - trips
      operationId: close_trip
      summary: Close a trip
      description: Close an approved trip.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/close-a-trip-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoExpense.trip.CREATE
    parameters:
      - name: trip_id
        in: path
        required: true
        description: Unique identifier of the trip.
        schema:
          type: string
        example: '34017000000000103'
      - $ref: '#/components/parameters/organization_id'
components:
  parameters:
    organization_id:
      name: X-com-zoho-expense-organizationid
      description: ID of the organization
      in: header
      required: true
      schema:
        type: string
      example: '10234695'
  schemas:
    gendoc-attributes-schema:
      $ref: '#/components/schemas/trip'
    trip_id:
      description: Unique ID generated by the server. This is used as a identifier.
      type: integer
      format: int64
      example: '34017000000000103'
    currency_id:
      description: Unique ID for currency.
      type: integer
      format: int64
      example: '16367000000000097'
    budget_amount:
      description: Budget amount for the trip.
      type: number
      format: double
      example: 5000
    bcy_budget_amount:
      description: Budget amount for the trip in base currency.
      type: number
      format: double
      example: 5000
    is_international:
      description: Whether the trip is an international trip.
      type: boolean
      example: true
    is_round_trip:
      description: Whether the trip is a round trip.
      type: boolean
      example: true
    is_visa_required:
      description: Whether visa is required for the trip.
      type: boolean
      example: true
    start_date:
      description: Start date of the trip.
      type: string
      example: '2017-02-21'
    end_date:
      description: End date of the trip.
      type: string
      example: '2017-02-27'
    trip_number:
      description: Trip's unique number
      type: string
      example: TRIP-00001
    business_purpose:
      description: Purpose of the trip.
      type: string
      example: Meeting with client
    description:
      description: Any comments about the trip.
      type: string
      example: Regarding business proposal
    departure:
      description: Place of departure.
      type: string
      example: ABC International Airport
    destination_country:
      description: Destination Country of the trip.
      type: string
      example: Australia
    destination_city:
      description: Destination City of the trip.
      type: string
      example: melbourne
    meal_preference:
      description: Meal preference for the traveller in flight.
      type: string
      example: avml
    seat_preference:
      description: Seat preference for the traveller in flight.
      type: string
      example: middle
    is_billable:
      description: Whether the customer needs to be billed for the trip.
      type: boolean
      example: false
    customer_id:
      description: Unique ID of the customer associated with the trip.
      type: integer
      format: int64
      example: '16367000000096001'
    project_id:
      description: Unique ID of the project associated with the trip.
      type: integer
      format: int64
      example: '16367000000096055'
    project_name:
      description: Name of the project associated with the trip.
      type: string
      example: Brochure Design - Spa
    customer_name:
      description: Name of the customer associated with the trip.
      type: string
      example: Kenny Digital
    status:
      description: Status of the trip.
      type: string
      example: draft
    order:
      description: Order of the line item.
      type: integer
      example: 1
    departure_date:
      description: Date of departure.
      type: string
      example: '2017-09-08'
    departure_country:
      description: Departure Country.
      type: string
      example: india
    departure_state:
      description: Departure State.
      type: string
      example: tamil nadu
    departure_city:
      description: Departure City.
      type: string
      example: chennai
    arrival_date:
      description: Date of arrival.
      type: string
      example: '2017-09-08'
    arrival_country:
      description: Arrival Country
      type: string
      example: australia
    arrival_state:
      description: Arrival State
      type: string
      example: victoria
    arrival_city:
      description: Arrival City
      type: string
      example: melbourne
    travel_mode:
      description: Mode of transportation. Possible values are <code>flight</code> ,<code>by_road</code>, <code>train</code>, <code>bus</code>
      type: string
      example: flight
    is_personal_travel:
      description: Whether it is a personal trip.
      type: boolean
      example: true
    is_accomodation:
      description: Whether accomodation is provided.
      type: boolean
      example: false
    line_item_id:
      description: Unique ID for identifying the line item. This is server generated.
      type: integer
      format: int64
      example: '34017000000091584'
    line_items:
      type: array
      description: List of items associated with the trip
      items:
        type: object
        properties:
          line_item_id:
            $ref: '#/components/schemas/line_item_id'
          order:
            $ref: '#/components/schemas/order'
          departure_date:
            $ref: '#/components/schemas/departure_date'
          departure_country:
            $ref: '#/components/schemas/departure_country'
          departure_state:
            $ref: '#/components/schemas/departure_state'
          departure_city:
            $ref: '#/components/schemas/departure_city'
          arrival_date:
            $ref: '#/components/schemas/arrival_date'
          arrival_country:
            $ref: '#/components/schemas/arrival_country'
          arrival_state:
            $ref: '#/components/schemas/arrival_state'
          arrival_city:
            $ref: '#/components/schemas/arrival_city'
          travel_mode:
            $ref: '#/components/schemas/travel_mode'
          is_personal_travel:
            $ref: '#/components/schemas/is_personal_travel'
          is_accomodation:
            $ref: '#/components/schemas/is_accomodation'
    air_travel_itinerary:
