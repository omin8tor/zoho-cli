  securitySchemes:
    Zoho_Auth:
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://accounts.zoho.com/oauth/v2/auth
          scopes:
            ZohoExpense.contacts.CREATE: Create customer
            ZohoExpense.customer.READ: Read customer
            ZohoExpense.customer.UPDATE: Update customer
            ZohoExpense.contacts.DELETE: Delete customer
