        department_id:
          $ref: '#/components/schemas/department_id'
        department_name:
          $ref: '#/components/schemas/department_name'
        designation_name:
          $ref: '#/components/schemas/designation_name'
        designation_id:
          $ref: '#/components/schemas/designation_id'
        date_of_birth:
          $ref: '#/components/schemas/date_of_birth'
        date_of_joining:
          $ref: '#/components/schemas/date_of_joining'
        mobile:
          $ref: '#/components/schemas/mobile'
        gender:
          $ref: '#/components/schemas/gender'
        policy_id:
          $ref: '#/components/schemas/policy_id'
        policy_name:
          $ref: '#/components/schemas/policy_name'
        bank_name:
          $ref: '#/components/schemas/bank_name'
        bank_account_type:
          $ref: '#/components/schemas/bank_account_type'
        custom_fields:
          $ref: '#/components/schemas/custom_fields'
        user_mail_in_id:
          $ref: '#/components/schemas/user_mail_in_id'
    delete-an-user-response:
      type: object
      properties:
        code:
          type: integer
          example: 0
          readOnly: true
        message:
          type: string
          example: The user has been deleted.
          readOnly: true
    make-an-user-inactive-response:
      type: object
      properties:
        code:
          type: integer
          example: 0
          readOnly: true
        message:
          type: string
          example: The user has been marked as inactive.
          readOnly: true
    make-an-user-active-response:
      type: object
      properties:
        code:
          type: integer
          example: 0
          readOnly: true
        message:
          type: string
          example: The user has been marked as active.
          readOnly: true
    assign-a-role-to-user-response:
      type: object
      properties:
        code:
          type: integer
          example: 0
          readOnly: true
        message:
          type: string
          example: Role has been assigned to the user
          readOnly: true
  securitySchemes:
    Zoho_Auth:
